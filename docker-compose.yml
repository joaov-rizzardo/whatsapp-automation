services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whatsapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whatsapp}
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_automation}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatsapp} -d ${POSTGRES_DB:-whatsapp_automation}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - whatsapp-automation

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - whatsapp-automation

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-whatsapp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-whatsapp}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP — o backend no host conecta aqui
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # management UI — inspecionar topologia
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-automation

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_USER:-whatsapp}:${POSTGRES_PASSWORD:-whatsapp}@postgres:5432/${POSTGRES_DB:-whatsapp_automation}?schema=evolution_api"
      # Só o estado da instância/sessão persiste — nada de conteúdo de conversa
      # (spec 003 §3: a Evolution não é um banco de mensagens paralelo ao nosso).
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"
      DATABASE_SAVE_IS_ON_WHATSAPP: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/1"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      # QR Code rendered in the ZapBot brand purple (--purple-500 / --brand).
      QRCODE_COLOR: "#8B3AE5"
      # --- Transporte de eventos: RabbitMQ global, só os 2 eventos da spec 003 ---
      # Os eventos da Evolution chegam ao backend por RabbitMQ, não por webhook HTTP
      # (spec 003 §3). Sem webhook, a Evolution não precisa alcançar o backend —
      # por isso extra_hosts/host.docker.internal saiu.
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URI: "amqp://${RABBITMQ_USER:-whatsapp}:${RABBITMQ_PASSWORD:-whatsapp}@rabbitmq:5672/"
      RABBITMQ_EXCHANGE_NAME: "evolution"
      RABBITMQ_GLOBAL_ENABLED: "true"
      RABBITMQ_EVENTS_QRCODE_UPDATED: "true"
      RABBITMQ_EVENTS_CONNECTION_UPDATE: "true"
      # todos os outros RABBITMQ_EVENTS_* são "false" por default — não reativar
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - whatsapp-automation

networks:
  whatsapp-automation:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  rabbitmq_data:
